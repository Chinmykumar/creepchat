<!DOCTYPE html>
<html>

<head>

<title>CreepChat</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/static/manifest.json">

<meta name="theme-color" content="#00ff9c">

</head>

<body>

<canvas id="matrix"></canvas>

<div id="boot">
<div id="bootText"></div>
</div>

<div class="chat-box">

<h2>creepchat</h2>

<input id="username" placeholder="username">
<button onclick="join()">Join</button>

<div id="chatHeader">Global Chat</div>

<div class="layout">

<div class="chat">

<ul id="messages"></ul>

<input id="msg" placeholder="message">
<button onclick="send()">Send</button>

</div>

<div class="users">
<h3>Online</h3>
<ul id="userlist"></ul>
</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

<script>

var socket = io()
var username=""
var activeUser=null

/* hacker boot text */

var bootLines=[
"initializing creepchat node...",
"loading encryption modules...",
"establishing secure channel...",
"connecting to ghostnet...",
"handshake complete",
"system ready"
]

document.addEventListener("DOMContentLoaded",function(){

var bootText=document.getElementById("bootText")

let i=0

function nextLine(){

if(i<bootLines.length){

bootText.innerHTML+=bootLines[i]+"<br>"
i++

setTimeout(nextLine,400)

}else{

setTimeout(function(){
document.getElementById("boot").style.display="none"
},800)

}

}

nextLine()

})

function join(){

username=document.getElementById("username").value

if(username==="") return

socket.emit("join",username)

document.getElementById("username").disabled=true

}

/* user list */

socket.on("users",function(list){

var ul=document.getElementById("userlist")
ul.innerHTML=""

list.forEach(function(u){

if(u===username) return

var li=document.createElement("li")
li.innerText=u

li.onclick=function(){

activeUser=u

document.getElementById("chatHeader").innerText="Chat with "+u

socket.emit("open_private",{target:u})

document.getElementById("messages").innerHTML=""

}

ul.appendChild(li)

})

})

/* global message */

socket.on("message",function(data){

if(activeUser!==null) return

var li=document.createElement("li")
li.innerHTML="<b>"+data.user+"</b>: "+data.msg

document.getElementById("messages").appendChild(li)

scrollDown()

})

/* private message */

socket.on("private_message",function(data){

var li=document.createElement("li")
li.innerHTML="<b>"+data.user+"</b>: "+data.msg

document.getElementById("messages").appendChild(li)

scrollDown()

})

/* chat history */

socket.on("history",function(history){

var box=document.getElementById("messages")
box.innerHTML=""

history.forEach(function(row){

var li=document.createElement("li")
li.innerHTML="<b>"+row[0]+"</b>: "+row[1]

box.appendChild(li)

})

scrollDown()

})

function send(){

var msg=document.getElementById("msg").value

if(msg==="") return

if(activeUser){

socket.emit("send_private",{to:activeUser,msg:msg})

}else{

socket.emit("send_global",msg)

}

document.getElementById("msg").value=""

}

function scrollDown(){

var box=document.getElementById("messages")
box.scrollTop=box.scrollHeight

}

/* MATRIX RAIN */

var canvas=document.getElementById("matrix")
var ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

var letters="01".split("")

var fontSize=14
var columns=canvas.width/fontSize

var drops=[]

for(var i=0;i<columns;i++){
drops[i]=1
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff9c"
ctx.font=fontSize+"px monospace"

for(var i=0;i<drops.length;i++){

var text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}

drops[i]++

}

}

setInterval(draw,33)

/* service worker */

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("/static/sw.js")
}

</script>

</body>
</html>
